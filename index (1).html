async function callAI(systemPrompt, userMessage, onChunk){
  const response = await fetch(GROQ_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${GROQ_KEY}`
    },
    body: JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: 1500,
      stream: true,
      messages: [
        {role: "system", content: systemPrompt},
        {role: "user", content: userMessage}
      ]
    })
  });
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText = "";
  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    const chunk = decoder.decode(value);
    for(const line of chunk.split("\n")){
      if(line.startsWith("data:")){
        const data = line.slice(5).trim();
        if(data === "[DONE]") break;
        try{
          const parsed = JSON.parse(data);
          const content = parsed.choices?.[0]?.delta?.content;
          if(content){ fullText += content; onChunk(fullText); }
        }catch(e){}
      }
    }
  }
  return fullText;
}

function BMIChart({updates,currentBMI}){
  const profile=JSON.parse(localStorage.getItem("bym_profile")||"{}");
  const heightM=profile.height?(+profile.height/100):null;
  let points=updates.filter(u=>u.weight&&heightM).map(u=>({date:u.date,bmi:+(+u.weight/(heightM*heightM)).toFixed(1)}));
  if(points.length===0&&currentBMI)points=[{date:"Now",bmi:currentBMI}];
  if(points.length<1)return null;
  const vals=points.map(p=>p.bmi);
  const minV=Math.min(...vals,16),maxV=Math.max(...vals,33),range=maxV-minV||1;
  const W=560,H=110,PL=36,PR=16,PT=20,PB=22;
  const cx=i=>PL+(i/Math.max(points.length-1,1))*(W-PL-PR);
  const cy=v=>PT+(1-(v-minV)/range)*(H-PT-PB);
  const bmiColor=b=>b<18.5?"#378ADD":b<25?"#6aaa3a":b<30?GOLD:"#E24B4A";
  return(
    <GlassCard style={{marginBottom:14}}>
      <GoldLabel>BMI PROGRESS CHART</GoldLabel>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
        {[18.5,25,30].map(v=>(
          <g key={v}>
            <line x1={PL} y1={cy(v)} x2={W-PR} y2={cy(v)} stroke="#1e1e1e" strokeWidth="1" strokeDasharray="4,4"/>
            <text x={PL-4} y={cy(v)} textAnchor="end" dominantBaseline="middle" fontSize="9" fill="#444">{v}</text>
          </g>
        ))}
        {points.length>1&&<polyline fill="none" stroke={GOLD} strokeWidth="2.5" strokeLinejoin="round" points={points.map((p,i)=>`${cx(i)},${cy(p.bmi)}`).join(" ")}/>}
        {points.map((p,i)=>(
          <g key={i}>
            <circle cx={cx(i)} cy={cy(p.bmi)} r={5} fill={bmiColor(p.bmi)} stroke="#080808" strokeWidth="2"/>
            <text x={cx(i)} y={cy(p.bmi)-11} textAnchor="middle" fontSize="10" fill={bmiColor(p.bmi)} fontWeight="700" fontFamily="Georgia,serif">{p.bmi}</text>
            <text x={cx(i)} y={H-4} textAnchor="middle" fontSize="8" fill="#333">{p.date?p.date.split(" ").slice(0,2).join(" "):""}</text>
          </g>
        ))}
      </svg>
      <div style={{display:"flex",gap:16,marginTop:6}}>
        {[["#378ADD","Underweight"],["#6aaa3a","Healthy"],["#C9A84C","Overweight"],["#E24B4A","Obese"]].map(([c,l])=>(

            <span style={{fontSize:10,color:"#444"}}>{l}</span>
          </div>
        ))}
      </div>
    </GlassCard>
  );
}

                    {diff!==null&&<div style={{textAlign:"center",minWidth:56}}>
                      <div style={{fontSize:15,fontWeight:900,fontFamily:"Georgia,serif",color:diff<0?"#6aaa3a":diff>0?"#E24B4A":"#555"}}>{diff>0?"+":""}{diff}kg</div>
                      <div style={{fontSize:9,color:"#2a2a2a",letterSpacing:"1px"}}>VS PREV</div>
                    </div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {tab==="chat"&&(
        <div className="fade-up" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)"}}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,color:GOLD,letterSpacing:"2px",marginBottom:6}}>MEL MIRACLE AI</div>
            <h1 style={{fontSize:22,fontWeight:800,color:"#f0e8d8",fontFamily:"Georgia,serif"}}>Your AI Coach</h1>
            <p style={{fontSize:11,color:"#2a2a2a",marginTop:3}}>Fitness & nutrition topics only · Knows your profile & conditions</p>
          </div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingBottom:16}}>
            {messages.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="ai"&&<div style={{width:30,height:30,borderRadius:"50%",background:"#0d0900",border:`1px solid ${GOLD}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,marginRight:8,flexShrink:0,marginTop:2}}>💪</div>}
                <div style={{maxWidth:"76%",padding:"12px 16px",borderRadius:m.role==="user"?"12px 12px 4px 12px":"4px 12px 12px 12px",background:m.role==="user"?GOLD:"#0f0f0f",color:m.role==="user"?"#080808":"#c8c0b4",fontSize:13,lineHeight:1.7,border:m.role==="ai"?"1px solid #1a1a1a":"none",whiteSpace:"pre-wrap"}}>
                  {m.text||<Spinner/>}
                </div>
              </div>
            ))}
            <div ref={chatEndRef}/>
          </div>
          <div style={{borderTop:"1px solid #111",paddingTop:14,display:"flex",gap:8}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()} placeholder="Ask about workouts, diet, PCOS, injuries, nutrition, mindset..." style={{flex:1}}/>
            <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()} style={{padding:"10px 22px",borderRadius:8,minWidth:72,fontWeight:700,fontSize:13,transition:"all .2s",background:chatLoading||!chatInput.trim()?"#111":GOLD,color:chatLoading||!chatInput.trim()?"#333":"#080808"}}>
              {chatLoading?<Spinner/>:"Send"}
            </button>
          </div>
        </div>
      )}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
