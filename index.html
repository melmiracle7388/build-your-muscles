/* ─── CLAUDE API ─── */
const API_URL="https://api.anthropic.com/v1/messages";
async function callClaude(system,userMsg,onChunk){
  const response=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      stream:true,
      system:system,
      messages:[{role:"user",content:userMsg}]
    })
  });
  const reader=response.body.getReader();
  const decoder=new TextDecoder();
  let fullText="";
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    const chunk=decoder.decode(value);
    for(const line of chunk.split("\n")){
      if(line.startsWith("data:")){
        const data=line.slice(5).trim();
        if(data==="[DONE]")break;
        try{
          const parsed=JSON.parse(data);
          if(parsed.delta&&parsed.delta.text){
            fullText+=parsed.delta.text;
            onChunk(fullText);
          }
        }catch(e){}
      }
    }
  }
  return fullText;
}

/* ─── BMI CHART ─── */
function BMIChart({updates,currentBMI}){
  const profile=JSON.parse(localStorage.getItem("bym_profile")||"{}");
  const heightM=profile.height?(+profile.height/100):null;
  let points=updates.filter(u=>u.weight&&heightM).map(u=>({
    date:u.date,bmi:+(+u.weight/(heightM*heightM)).toFixed(1)
  }));
  if(points.length===0&&currentBMI)points=[{date:"Now",bmi:currentBMI}];
  if(points.length<1)return null;
  const vals=points.map(p=>p.bmi);
  const minV=Math.min(...vals,16);
  const maxV=Math.max(...vals,33);
  const range=maxV-minV||1;
  const W=560,H=110,PL=36,PR=16,PT=20,PB=22;
  const cx=i=>PL+(i/Math.max(points.length-1,1))*(W-PL-PR);
  const cy=v=>PT+(1-(v-minV)/range)*(H-PT-PB);
  const bmiColor=b=>b<18.5?"#378ADD":b<25?"#6aaa3a":b<30?GOLD:"#E24B4A";
  const zones=[{max:18.5,col:"#378ADD"},{max:25,col:"#6aaa3a"},{max:30,col:GOLD},{max:40,col:"#E24B4A"}];
  return(
    <GlassCard style={{marginBottom:14}}>
      <GoldLabel>BMI PROGRESS CHART</GoldLabel>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
        {[18.5,25,30].map(v=>(
          <line key={v} x1={PL} y1={cy(v)} x2={W-PR} y2={cy(v)}
            stroke="#1e1e1e" strokeWidth="1" strokeDasharray="4,4"/>
        ))}
        {[18.5,25,30].map(v=>(
          <text key={v} x={PL-4} y={cy(v)} textAnchor="end" dominantBaseline="middle"
            fontSize="9" fill="#444">{v}</text>
        ))}
        {points.length>1&&(
          <polyline fill="none" stroke={GOLD} strokeWidth="2.5" strokeLinejoin="round"
            points={points.map((p,i)=>`${cx(i)},${cy(p.bmi)}`).join(" ")}/>
        )}
        {points.map((p,i)=>(
          <g key={i}>
            <circle cx={cx(i)} cy={cy(p.bmi)} r={5} fill={bmiColor(p.bmi)} stroke="#080808" strokeWidth="2"/>
            <text x={cx(i)} y={cy(p.bmi)-11} textAnchor="middle" fontSize="10"
              fill={bmiColor(p.bmi)} fontWeight="700" fontFamily="Georgia,serif">{p.bmi}</text>
            <text x={cx(i)} y={H-4} textAnchor="middle" fontSize="8" fill="#333">
              {p.date?p.date.split(" ").slice(0,2).join(" "):""}
            </text>
          </g>
        ))}
      </svg>
      <div style={{display:"flex",gap:16,marginTop:6}}>
        {[["#378ADD","Underweight"],["#6aaa3a","Healthy"],["#C9A84C","Overweight"],["#E24B4A","Obese"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:9,height:9,borderRadius:"50%",background:c}}/>
            <span style={{fontSize:10,color:"#444"}}>{l}</span>
          </div>
        ))}
      </div>
    </GlassCard>
  );
}

{

          <div className="fade-up">
            <div style={{marginBottom:20}}>
              <div style={{fontSize:9,color:GOLD,letterSpacing:"2px",marginBottom:6}}>TRACK YOUR JOURNEY</div>
              <h1 style={{fontSize:24,fontWeight:800,color:"#f0e8d8",fontFamily:"Georgia,serif"}}>Progress</h1>
              <p style={{color:"#444",fontSize:13,marginTop:4}}>Log your weekly stats and watch your transformation over time</p>
            </div>

            <BMIChart updates={updates} currentBMI={bmi}/>

            {/* Log Form */}
            <GlassCard style={{marginBottom:16}}>
              <GoldLabel>LOG THIS WEEK'S STATS</GoldLabel>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
                <div>
                  <label style={{fontSize:10,color:"#444",display:"block",marginBottom:5,letterSpacing:"1px"}}>WEIGHT (kg) *</label>
                  <input type="number" placeholder="e.g. 68.5" value={updateForm.weight}
                    onChange={e=>setUpdateForm(f=>({...f,weight:e.target.value}))}/>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#444",display:"block",marginBottom:5,letterSpacing:"1px"}}>WAIST (cm)</label>
                  <input type="number" placeholder="optional" value={updateForm.waist}
                    onChange={e=>setUpdateForm(f=>({...f,waist:e.target.value}))}/>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#444",display:"block",marginBottom:5,letterSpacing:"1px"}}>CHEST (cm)</label>
                  <input type="number" placeholder="optional" value={updateForm.chest}
                    onChange={e=>setUpdateForm(f=>({...f,chest:e.target.value}))}/>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#444",display:"block",marginBottom:5,letterSpacing:"1px"}}>ENERGY LEVEL</label>
                  <select value={updateForm.energy} onChange={e=>setUpdateForm(f=>({...f,energy:e.target.value}))}>
                    <option>Low</option><option>Medium</option><option>High</option>
                  </select>
                </div>
                <div>
                  <label style={{fontSize:10,color:"#444",display:"block",marginBottom:5,letterSpacing:"1px"}}>WORKOUT DAYS (0–7)</label>
                  <input type="number" min="0" max="7" placeholder="e.g. 5" value={updateForm.days}
                    onChange={e=>setUpdateForm(f=>({...f,days:e.target.value}))}/>
                </div>
              </div>
              <button onClick={saveUpdate}
                style={{width:"100%",padding:"13px",borderRadius:10,background:GOLD,
                  color:"#080808",fontSize:14,fontWeight:700,letterSpacing:"0.5px"}}>
                Save This Week's Update
              </button>
            </GlassCard>

            {/* Summary Stats */}
            {updates.length>=2&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
                {[
                  ["Total Weight Change",+(updates[updates.length-1].weight-updates[0].weight).toFixed(1)+"kg"],
                  ["Weeks Tracked",updates.length+" weeks"],
                  ["Latest Energy",updates[updates.length-1].energy]
                ].map(([label,value])=>(
                  <div key={label} style={{background:"#0a0a0a",border:"1px solid #1a1a1a",
                    borderRadius:12,padding:"14px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#444",letterSpacing:"1px",marginBottom:5}}>
                      {label.toUpperCase()}
                    </div>
                    <div style={{fontSize:22,fontWeight:900,color:GOLD,fontFamily:"Georgia,serif"}}>{value}</div>
                  </div>
                ))}
              </div>
            )}

            {updates.length===0?(
              <div style={{textAlign:"center",padding:"48px 20px",color:"#222",
                fontFamily:"Georgia,serif",fontSize:14}}>
                Log your first week above to start tracking your transformation.
              </div>
            ):(
              <div>
                <div style={{fontSize:9,color:"#444",letterSpacing:"2px",marginBottom:12}}>UPDATE HISTORY</div>
                {[...updates].reverse().map((u,i)=>{
                  const reversedUpdates=[...updates].reverse();
                  const prev=i<reversedUpdates.length-1?reversedUpdates[i+1]:null;
                  const diff=prev?+(u.weight-prev.weight).toFixed(1):null;
                  return(
                    <div key={i} style={{background:"#0d0d0d",border:"1px solid #161616",
                      borderRadius:12,padding:"13px 18px",marginBottom:8,
                      display:"flex",alignItems:"center",gap:16}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:"#2a2a2a",marginBottom:5,letterSpacing:"0.5px"}}>{u.date}</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
                          <span style={{fontSize:22,fontWeight:900,color:GOLD,fontFamily:"Georgia,serif"}}>{u.weight}kg</span>
                          {u.waist&&<span style={{fontSize:12,color:"#444"}}>Waist {u.waist}cm</span>}
                          {u.chest&&<span style={{fontSize:12,color:"#444"}}>Chest {u.chest}cm</span>}
                          <span style={{fontSize:12,color:"#444"}}>Energy: {u.energy}</span>
                          {u.days&&<span style={{fontSize:12,color:"#444"}}>{u.days}/7 days</span>}
                        </div>
                      </div>
                      {diff!==null&&(
                        <div style={{textAlign:"center",minWidth:56}}>
                          <div style={{fontSize:15,fontWeight:900,fontFamily:"Georgia,serif",
                            color:diff<0?"#6aaa3a":diff>0?"#E24B4A":"#555"}}>
                            {diff>0?"+":""}{diff}kg
                          </div>
                          <div style={{fontSize:9,color:"#2a2a2a",letterSpacing:"1px"}}>VS PREV</div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ════════ AI COACH ════════ */}
        {tab==="chat"&&(
          <div className="fade-up" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)"}}>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,color:GOLD,letterSpacing:"2px",marginBottom:6}}>MEL MIRACLE AI</div>
              <h1 style={{fontSize:22,fontWeight:800,color:"#f0e8d8",fontFamily:"Georgia,serif"}}>Your AI Coach</h1>
              <p style={{fontSize:11,color:"#2a2a2a",marginTop:3}}>
                Fitness & nutrition topics only · Knows your profile & health conditions
              </p>
            </div>

            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",
              gap:12,paddingBottom:16}}>
              {messages.map((m,i)=>(
                <div key={i} style={{display:"flex",
                  justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  {m.role==="ai"&&(
                    <div style={{width:30,height:30,borderRadius:"50%",
                      background:"#0d0900",border:`1px solid ${GOLD}33`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:13,marginRight:8,flexShrink:0,marginTop:2}}>💪</div>
                  )}
                  <div style={{maxWidth:"76%",padding:"12px 16px",
                    borderRadius:m.role==="user"?"12px 12px 4px 12px":"4px 12px 12px 12px",
                    background:m.role==="user"?GOLD:"#0f0f0f",
                    color:m.role==="user"?"#080808":"#c8c0b4",
                    fontSize:13,lineHeight:1.7,
                    border:m.role==="ai"?"1px solid #1a1a1a":"none",
                    whiteSpace:"pre-wrap"}}>
                    {m.text||<Spinner/>}
                  </div>
                </div>
              ))}
              <div ref={chatEndRef}/>
            </div>

            <div style={{borderTop:"1px solid #111",paddingTop:14,display:"flex",gap:8}}>
              <input value={chatInput}
                onChange={e=>setChatInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()}
                placeholder="Ask about workouts, diet, PCOS, injuries, nutrition, mindset..."
                style={{flex:1}}/>
              <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()}
                style={{padding:"10px 22px",borderRadius:8,minWidth:72,fontWeight:700,
                  fontSize:13,transition:"all .2s",
                  background:chatLoading||!chatInput.trim()?"#111":GOLD,
                  color:chatLoading||!chatInput.trim()?"#333":"#080808"}}>
                {chatLoading?<Spinner/>:"Send"}
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
